[build]
  command = "yarn build"
  publish = "dist"

# Proxy /api/* requests to the backend (uses API_PROXY_TARGET env var)
[[redirects]]
  from = "/api/*"
  to = "https://parcel-rather-plastic-shaved.trycloudflare.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
